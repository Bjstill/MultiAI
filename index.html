<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-AI Hub | 2026 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; }
        .chat-box { height: 450px; overflow-y: auto; border: 1px solid #1e293b; border-radius: 12px; padding: 16px; background: #0f172a; font-size: 0.9rem; }
        .user-label { color: #38bdf8; font-weight: 800; font-size: 0.7rem; margin-top: 12px; border-bottom: 1px solid #1e293b; padding-bottom: 2px; }
        .ai-label { color: #94a3b8; font-weight: 800; font-size: 0.7rem; margin-top: 12px; }
        .msg-text { margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">Multi-AI <span class="text-blue-500 font-bold">2026</span></h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em]">LIVE FREE ENDPOINTS</p>
            </div>
            
            <div class="flex gap-2 flex-wrap justify-center">
                <select id="modelSelector" class="bg-slate-800 text-sm p-2 rounded-lg border border-slate-700 text-white outline-none">
                    <option value="openrouter/free">Auto-Free Router (Best Choice)</option>
                    <option value="nvidia/nemotron-3-super:free">NVIDIA Nemotron 3 (Free)</option>
                    <option value="tencent/hy3-preview:free">Tencent Hy3 (Free)</option>
                    <option value="google/gemini-flash-1.5-8b">Gemini Flash 1.5 8B</option>
                    <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Free)</option>
                </select>
                <button onclick="addModel()" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold">Add</button>
                <button onclick="updateKey()" class="bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold">Set Key</button>
            </div>
        </header>

        <div id="chatGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-32"></div>

        <div class="fixed bottom-0 left-0 w-full bg-slate-950/90 backdrop-blur-lg border-t border-slate-800 p-6">
            <div class="max-w-4xl mx-auto flex gap-3">
                <input type="text" id="userInput" placeholder="Ask models..." class="flex-1 p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                <button onclick="askAll()" class="bg-white text-black px-8 rounded-xl font-black transition active:scale-95">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('openrouter_key');
        // UPDATED: Starting models that are active in May 2026
        let activeModels = ['openrouter/free', 'nvidia/nemotron-3-super:free'];

        function updateKey() {
            const newKey = prompt("Paste your OpenRouter Key:", API_KEY || "");
            if (newKey) { localStorage.setItem('openrouter_key', newKey.trim()); API_KEY = newKey.trim(); }
        }

        function addModel() {
            const model = document.getElementById('modelSelector').value;
            if (!activeModels.includes(model)) { activeModels.push(model); renderGrid(); }
        }

        function removeModel(index) { activeModels.splice(index, 1); renderGrid(); }

        function renderGrid() {
            const grid = document.getElementById('chatGrid');
            grid.innerHTML = '';
            activeModels.forEach((model, index) => {
                const boxId = `box-${index}`;
                const displayName = model.includes('/') ? model.split('/')[1].replace(':free', '').toUpperCase() : model.toUpperCase();
                grid.innerHTML += `
                    <div class="flex flex-col border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
                        <div class="bg-slate-900 px-4 py-2 flex justify-between items-center border-b border-slate-800">
                            <span class="text-[10px] font-black text-blue-400 tracking-widest">${displayName}</span>
                            <button onclick="removeModel(${index})" class="text-slate-500 hover:text-red-500 text-[10px] font-bold">REMOVE</button>
                        </div>
                        <div id="${boxId}" class="chat-box"></div>
                    </div>`;
            });
        }

        async function fetchAIResponse(modelName, targetElementId, prompt) {
            const displayBox = document.getElementById(targetElementId);
            displayBox.innerHTML += `<div class="user-label">USER</div><div class="msg-text">${prompt}</div>`;
            displayBox.innerHTML += `<div class="ai-label">RESPONSE</div>`;
            const responseContainer = document.createElement("div");
            responseContainer.className = "msg-text";
            displayBox.appendChild(responseContainer);

            try {
                if (!API_KEY) throw new Error("Key missing.");
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin
                    },
                    body: JSON.stringify({ "model": modelName, "messages": [{ "role": "user", "content": prompt }], "stream": true })
                });

                if (!response.ok) {
                    const errorJson = await response.json();
                    throw new Error(errorJson.error?.message || "Model endpoint not found.");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const data = line.slice(6);
                            if (data === "[DONE]") break;
                            try {
                                const content = JSON.parse(data).choices[0].delta.content || "";
                                responseContainer.innerText += content;
                                displayBox.scrollTop = displayBox.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                responseContainer.innerHTML = `<span class="text-red-500 font-bold">${error.message}</span>`;
            }
        }

        function askAll() {
            const input = document.getElementById('userInput');
            const val = input.value;
            if (!val) return;
            input.value = '';
            activeModels.forEach((model, index) => fetchAIResponse(model, `box-${index}`, val));
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") askAll(); });
        renderGrid();
    </script>
</body>
</html>
