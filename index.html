<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-AI Hub | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; }
        .chat-box { 
            height: 500px; 
            overflow-y: auto; 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            padding: 16px; 
            background: #0f172a; 
            font-size: 0.9rem; 
        }
        .user-label { color: #38bdf8; font-weight: 800; font-size: 0.7rem; margin-top: 12px; border-bottom: 1px solid #1e293b; padding-bottom: 2px; }
        .ai-label { color: #94a3b8; font-weight: 800; font-size: 0.7rem; margin-top: 12px; }
        .msg-text { margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">MULTI-AI <span class="text-blue-500">HUB</span></h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Free Model Comparison</p>
            </div>
            
            <div class="flex gap-2 flex-wrap justify-center">
                <select id="modelSelector" class="bg-slate-800 text-sm p-2 rounded-lg border border-slate-700 outline-none text-white">
                    <option value="google/gemini-flash-1.5-exp:free">Gemini 1.5 Flash (Free)</option>
                    <option value="meta-llama/llama-3-8b-instruct:free">Llama 3 8B (Free)</option>
                    <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Free)</option>
                    <option value="microsoft/phi-3-mini-128k-instruct:free">Phi-3 Mini (Free)</option>
                    <option value="openchat/openchat-7b:free">OpenChat 7B (Free)</option>
                </select>
                <button onclick="addModel()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold transition">Add</button>
                <button onclick="updateKey()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition">Set Key</button>
            </div>
        </header>

        <div id="chatGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-32"></div>

        <div class="fixed bottom-0 left-0 w-full bg-slate-950/90 backdrop-blur-lg border-t border-slate-800 p-6">
            <div class="max-w-4xl mx-auto flex gap-3">
                <input type="text" id="userInput" placeholder="Ask all models..." 
                       class="flex-1 p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="askAll()" class="bg-white text-black hover:bg-slate-200 px-8 rounded-xl font-black transition">SEND</button>
                <button onclick="clearAll()" class="bg-slate-800 hover:bg-slate-700 px-4 rounded-xl font-bold">Clear</button>
            </div>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('openrouter_key');
        // Initial Models - Updated to known working free slugs
        let activeModels = ['google/gemini-flash-1.5-exp:free', 'meta-llama/llama-3-8b-instruct:free'];

        function updateKey() {
            const newKey = prompt("Paste your OpenRouter Key:", API_KEY || "");
            if (newKey) {
                localStorage.setItem('openrouter_key', newKey.trim());
                API_KEY = newKey.trim();
                alert("Key Saved!");
            }
        }

        function addModel() {
            const model = document.getElementById('modelSelector').value;
            if (!activeModels.includes(model)) {
                activeModels.push(model);
                renderGrid();
            }
        }

        function removeModel(index) {
            activeModels.splice(index, 1);
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('chatGrid');
            grid.innerHTML = '';
            activeModels.forEach((model, index) => {
                const boxId = `box-${index}`;
                const name = model.split('/')[1].split(':')[0].toUpperCase();
                grid.innerHTML += `
                    <div class="flex flex-col border border-slate-800 rounded-2xl overflow-hidden">
                        <div class="bg-slate-900 px-4 py-2 flex justify-between items-center border-b border-slate-800">
                            <span class="text-[10px] font-black text-blue-400 tracking-widest">${name}</span>
                            <button onclick="removeModel(${index})" class="text-slate-500 hover:text-red-500 text-[10px] font-bold">REMOVE</button>
                        </div>
                        <div id="${boxId}" class="chat-box"></div>
                    </div>
                `;
            });
        }

        async function fetchAIResponse(modelName, targetElementId, prompt) {
            const displayBox = document.getElementById(targetElementId);
            displayBox.innerHTML += `<div class="user-label">USER</div><div class="msg-text">${prompt}</div>`;
            displayBox.innerHTML += `<div class="ai-label">${modelName.toUpperCase()}</div>`;
            
            const responseContainer = document.createElement("div");
            responseContainer.className = "msg-text";
            displayBox.appendChild(responseContainer);

            try {
                if (!API_KEY) throw new Error("Click 'Set Key' first.");

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin,
                        "X-Title": "Multi-AI Hub"
                    },
                    body: JSON.stringify({
                        "model": modelName,
                        "messages": [{ "role": "user", "content": prompt }],
                        "stream": true
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Status ${response.status}: ${errText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const data = line.slice(6);
                            if (data === "[DONE]") break;
                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices[0].delta.content || "";
                                responseContainer.innerText += content;
                                displayBox.scrollTop = displayBox.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                responseContainer.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        }

        function askAll() {
            const input = document.getElementById('userInput');
            const val = input.value;
            if (!val) return;
            input.value = '';
            activeModels.forEach((model, index) => {
                fetchAIResponse(model, `box-${index}`, val);
            });
        }

        function clearAll() {
            activeModels.forEach((_, index) => {
                const box = document.getElementById(`box-${index}`);
                if (box) box.innerHTML = '';
            });
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") askAll();
        });

        renderGrid();
    </script>
</body>
</html>
